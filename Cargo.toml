  "dd",
  "tail",
  "nl",
  "stat",
  "tac",
  "tr",
  "factor",
  "tee",
  "seq",
]

# "feat_os_unix" == 可在现代/常见的 *nix 平台上构建/运行的实用工具集
feat_os_unix = [
  "feat_selinux",
  "feat_acl",
  "feat_common_core",
  "chcon",
  "chgrp",
  "chmod",
  "chown",
  "chroot",
  "dircolors",
  "groups",
  "logname",
  "mkfifo",
  "mknod",
  "nice",
  "nohup",
  "sync",
  "tty",
  "uptime",
  "users",
  "who",
  "kill",
  "stty",
  "link",
  "paste",
  "timeout",
  "install",
]

# "feat_os_windows" == 可在现代/常见的windows平台上构建/运行的实用工具集
feat_os_windows = [
  "feat_common_core",  
  ]

# "feat_require_selinux" == 依赖SELinux的实用工具集。
feat_require_selinux = ["chcon"]

