[workspace]
members = [
    "src/compat_test",
]
# syskits workspace 信息
[workspace.package] # 共享的package配置项
version = "2.2.1" 
authors = ["CTyunOS linux developers"]
license = "Mulan PSL v2.0"
homepage = "https://www.ctyun.cn/developer"
keywords = ["syskits", "cross-platform", "cli", "utility"]
categories = ["command-line-utilities"]
edition = "2024"

[package]
name = "syskits"
version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
description = "CTyunOS implemented as universal (cross-platform) utils, written in Rust"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits"
default-run = "syskits"
readme = "README.md"
rust-version = "1.85.0"
build = "build.rs"

[features]
default = ["feat_common_core"]

## OS feature shortcodes
unix = ["feat_os_unix"]
windows = ["feat_os_windows"]

## project-specific feature shortcodes
nightly = []
test_unimplemented = []
# * 仅在启用了 `--feature ctdoc` 时构建 `ctdoc`
ctdoc = ["zip", "dep:cthelp_parser"]
## features
# "feat_acl" == 启用对ACLs（访问控制列表）的支持；使用 `--features feat_acl`
# 注意：
# * 在linux上，posix-acl/acl-sys crate在编译时需要访问C工具链中的 `libacl` 头文件和共享库。
feat_acl = ["cp/feat_acl", "ls/feat_acl"]

# "feat_selinux" == 启用对SELinux安全上下文的支持；使用 `--features feat_selinux`
# 注意：
# * selinux(-sys) crate在编译时需要访问C工具链中的 `libselinux` 头文件和共享库。
# * 运行编译了 `feat_selinux` 的ctutils需要SELinux启用的内核。
feat_selinux = [
  "cp/selinux",
  "ls/selinux",
  "selinux",
  "feat_require_selinux",
]

##
## 功能集
## (常见/核心) 功能集
# "feat_common_core" == 可在大多数目标上构建/运行的基线核心实用工具集
feat_common_core = [
  "arch",
  "base32",
  "cat",
  "yes",
  "chcon",
  "base64",
  "whoami",
  "wc",
  "chroot",
  "cp",
  "ls",
  "cksum",
  "vdir",
  "csplit",
  "dir",
  "split",
  "sort",
  "cat",
  "cksum",
  "comm",
  "du",
  "chown",
  "uname",
  "mkdir",
  "mktemp",
  "mv",
  "unexpand",
  "tsort",
  "truncate",
  "rmdir",
  "pwd",
  "touch",
  "readlink",
  "sum",
  "sleep",
  "unlink",
  "hostname",
  "cut",
  "pr",
  "logname",
  "df",
  "numfmt",
  "tty",
  "env",
  "fmt",
  "dirname",
  "printenv",
  "printf",
  "echo",
  "touch",
  "nohup",
  "readlink",
  "false",
  "sum",
  "expr",
  "true",
  "groups",
  "sleep",
  "expand",
  "uniq",
  "cut",
  "df",
  "env",
  "date",
  "printenv",
  "expr",
  "nproc",
  "basename",
  "hostid",
  "rm",
  "head",
  "id",
