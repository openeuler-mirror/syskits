# syskits workspace 信息
[workspace.package] # 共享的package配置项
version = "1.0.0" 
authors = ["CTyunOS linux developers"]
license = "Mulan PSL v2.0"
homepage = "https://www.ctyun.cn/developer"
keywords = ["syskits", "cross-platform", "cli", "utility"]
categories = ["command-line-utilities"]
edition = "2021"

[package]
name = "syskits"
version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
description = "CTyunOS implemented as universal (cross-platform) utils, written in Rust"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits"
default-run = "syskits"
readme = "README.md"
rust-version = "1.70.0"
build = "build.rs"

[features]
default = ["feat_common_core"]

## OS feature shortcodes
unix = ["feat_os_unix"]
windows = ["feat_os_windows"]

## project-specific feature shortcodes
nightly = []
test_unimplemented = []
# * 仅在启用了 `--feature ctdoc` 时构建 `ctdoc`
ctdoc = ["zip", "dep:cthelp_parser"]

# "feat_selinux" == 启用对SELinux安全上下文的支持；使用 `--features feat_selinux`
# 注意：
# * selinux(-sys) crate在编译时需要访问C工具链中的 `libselinux` 头文件和共享库。
# * 运行编译了 `feat_selinux` 的ctutils需要SELinux启用的内核。
feat_selinux = [
  "selinux",
  "feat_require_selinux",
]

##
## 功能集
## (常见/核心) 功能集
# "feat_common_core" == 可在大多数目标上构建/运行的基线核心实用工具集
feat_common_core = [
  "arch",
  "base32",
  "cat",
  "yes",
  "chcon",
  "base64",
  "whoami",
  "chgrp",
  "basename",
  "who",
  "chmod",
  "basenc",
]

# "feat_os_unix" == 可在现代/常见的 *nix 平台上构建/运行的实用工具集
feat_os_unix = [
  "feat_selinux",
  "feat_common_core",
]

# "feat_os_windows" == 可在现代/常见的windows平台上构建/运行的实用工具集
feat_os_windows = [
  "feat_common_core",  
]

# "feat_require_selinux" == 依赖SELinux的实用工具集。
feat_require_selinux = ["chcon"]

