[package]
name = "syskits"
version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
keywords = { workspace = true }
categories = { workspace = true }
edition = { workspace = true }
description = "CTyunOS implemented as universal utils, written in Rust"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits" 
default-run = "syskits"
readme = "../../../README.md" 
rust-version = { workspace = true }

[features]
default = ["feat_common_core"]
feat_require_selinux = ["chcon", "runcon"]
feat_acl = ["cp/feat_acl", "ls/feat_acl"]
feat_selinux = [
  "cp/selinux",
  "ls/selinux",
  "selinux",
  "feat_require_selinux"
]

# 功能集
feat_common_core = ["arch", "base32", "base64", "basename", "basenc", "cat", "cksum", 
  "comm", "cp", "csplit", "cut", "date", "dd", "df", "dir", "dircolors", "dirname", 
  "du", "echo", "env", "expand", "expr", "factor", "false", "fmt", "fold", "hashsum",
  "head", "hostname", "join", "link", "ln", "ls", "mkdir", "mktemp", "more", "mv", 
  "nl", "nproc", "numfmt", "od", "paste", "pr", "printenv", "printf", "ptx", "pwd", 
  "readlink", "realpath", "rm", "rmdir", "seq", "shred", "shuf", "sleep", "sort", 
  "split", "sum", "sync", "tac", "tail", "tee", "command_test", "touch", "touch", "tr", 
  "true", "truncate", "tsort", "uname", "unexpand", "uniq", "unlink", "vdir", 
  "wc", "whoami", "yes",]

feat_common_core_unix = ["chgrp", "chmod", "chown", "chroot", "groups", "id",
  "install", "kill", "logname", "mkfifo", "mknod", "nice", "nohup", "pathchk", 
  "stat", "stty", "timeout", "tty",
  # depend on utmpx (requiring unix utmp/utmpx support)
  "pinky", "uptime", "users", "who",
  # depend on hostid (gethostid of libc)
  "hostid",
  # depend on cpp crate
  "stdbuf",
]

feat_os_unix = [
  "feat_common_core",
  "feat_common_core_unix",
]

feat_os_windows = [
  "feat_common_core"
]

# OS feature shortcodes
unix = ["feat_os_unix"]
windows = ["feat_os_windows"]

[dependencies]
# Workspace-provided shared libraries
ctcore = { workspace = true }
tool_derive = { workspace = true }

# External dependencies inherited from workspace where possible, or defined directly
clap = { workspace = true, features = ["derive", "cargo", "wrap_help"] }
once_cell = { workspace = true }
clap_complete = { workspace = true }
clap_mangen = { workspace = true }
selinux = { workspace = true, optional = true }
textwrap = { workspace = true }
zip = { workspace = true, optional = true }
anyhow = { workspace = true }

# Tool Crates - paths relative to bin/syskits/
arch = { optional = true, package = "ct_arch", path = "../../crates/commands/arch" }
base32 = { optional = true, package = "ct_base32", path = "../../crates/commands/base32" }
cat = { optional = true, package = "ct_cat", path = "../../crates/commands/cat" }
yes = { optional = true, package = "ct_yes", path = "../../crates/commands/yes" }
