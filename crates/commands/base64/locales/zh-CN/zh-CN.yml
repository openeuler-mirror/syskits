base64:
  clap:
    base_decode: 解码数据
    base_ignore_garbage: 解码时忽略非字母字符
    base_wrap: 在指定字符数后换行（默认76，0表示不换行）
  usage: base64 [选项]... [文件]
  about: |-
    编码/解码数据并打印到标准输出
    如果没有指定文件，或者文件为'-'，则从标准输入读取。

    数据按照RFC 3548中描述的base64字母表进行编码。
    解码时，输入可能包含换行符，这是正式base64字母表
    字节之外的内容。使用--ignore-garbage可以尝试从
    编码流中恢复任何其他非字母表字节。
