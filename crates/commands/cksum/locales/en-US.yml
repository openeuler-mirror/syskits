cksum:
  clap:
    algorithm: select the digest type to use. See DIGEST below
    untagged: create a reversed style checksum, without digest type
    tag: create a BSD style checksum, undo --untagged (default)
    raw: emit a raw binary digest, not hexadecimal
    base64: emit a base64 digest, not hexadecimal
    help: show help information
    version: show version information
    length: digest length in bits; must not exceed the max for the blake2 algorithm and must be a multiple of 8
    check: read checksums from the FILEs and check them
    quiet: don't print OK for each successfully verified file
    status: don't output anything, status code shows success
    ignore_missing: don't fail or report status for missing files
    strict: exit non-zero for improperly formatted checksum lines
    warn: warn about improperly formatted checksum lines
    zero: end each output line with NUL, not newline, and disable file name escaping
  usage: cksum [OPTIONS] [FILE]...
  about: Print CRC and size for each file
  after_help: |-
    DIGEST determines the digest algorithm and default output format:
    - `sysv`:    (equivalent to sum -s)
    - `bsd`:     (equivalent to sum -r)
    - `crc`:     (equivalent to cksum)
    - `md5`:     (equivalent to md5sum)
    - `sha1`:    (equivalent to sha1sum)
    - `sha224`:  (equivalent to sha224sum)
    - `sha256`:  (equivalent to sha256sum)
    - `sha384`:  (equivalent to sha384sum)
    - `sha512`:  (equivalent to sha512sum)
    - `blake2b`: (equivalent to b2sum)
    - `sm3`:     (only available through cksum)
