cut:
  clap:
    bytes: 从输入源过滤字节列
    characters: 字符模式的别名
    whitespace_delimited: 使用任意数量的空白字符（空格、制表符）来分隔输入源中的字段（FreeBSD扩展）。
    fields: 从输入源过滤字段列
    complement: 反转过滤器 - 不显示过滤的列，而是显示除这些列以外的所有列
    only_delimited: 在字段模式下，只打印包含分隔符的行
    zero_terminated: 不基于行过滤列，而是基于\\0（空字符）过滤列
  usage: cut 选项... [文件]...
  about: '从标准输入或输入文件的每一行中打印指定的字节或字段列'
  after_help: |-
    每次调用必须指定一个模式（用于列的方式），
    一个序列（要打印哪些列），并提供一个数据源
    使用`--bytes`（`-b`）或`--characters`（`-c`）来指定字节模式
    使用`--fields`（`-f`）来指定字段模式，其中每行都按分隔符字符分成字段。
    例如，对于典型的CSV，您可以将此与设置逗号作为分隔符结合使用
    序列是由逗号分隔的一个或多个数字或包含范围的组。
    ```
    cut -f 2,5-7 some_file.txt
    ```
    将为每个源行显示第2、第5、第6和第7个字段
    范围可以通过省略第二个数字来延伸到行的末尾
    ```
    cut -f 3- some_file.txt
    ```
    将为每个源行显示第3个字段和之后的所有字段
    范围的第一个数字可以省略，这实际上相当于使用1作为第一个数字：
    它使范围从第一列开始。范围也可以显示单个列
    ```
    cut -f 1,3-5 some_file.txt
    ```
    将为每个源行显示第1、第3、第4和第5个字段
    使用`--complement`选项时，会反转序列的效果
    ```
    cut --complement -f 4-6 some_file.txt
    ```
    将显示除第4、第5和第6个字段之外的所有字段
    如果未指定`sourcefile`参数，则使用stdin作为要打印的行的来源
    如果指定了`sourcefile`参数，则忽略stdin，并连续读取所有文件
    如果未成功读取`sourcefile`，将向stderr打印警告，最终状态代码将为1，
    但cut将继续读取后续的`sourcefiles`
    要同时从STDIN和文件参数打印列，请使用`-`（破折号）作为
    `sourcefile`参数来表示stdin。
    每行中的字段由分隔符（分隔符）标识
    使用`--delimiter`（`-d`）选项设置分隔文件中字段的分隔符。
    设置分隔符是可选的。如果未设置，将使用Tab作为默认分隔符。
    如果提供了`-w`选项，字段将由任意数量的空白字符（空格和制表符）分隔。
    除非明确指定，否则输出分隔符将是制表符。只能指定`-d`或`-w`选项之一。
    这是从FreeBSD采用的扩展。
    如果提供了`--only-delimited`（`-s`）标志，则只会打印包含分隔符的行
    如果提供了`--output-delimiter`选项，则用于它的参数将替换每行中打印的
    分隔符字符。这对于转换表格数据很有用 - 例如，将CSV转换为TSV（制表符分隔文件）
    当使用`--zero-terminated`（`-z`）选项时，cut将\\0（空）视为
    "行结束"字符（用于读取行和分隔打印行），而不是\\n（换行）。
    这对于某些单元格可能包含换行符的表格数据很有用
    ```
    echo 'ab\\0cd' | cut -z -c 1
    ```
    将产生'a\\0c\\0'
