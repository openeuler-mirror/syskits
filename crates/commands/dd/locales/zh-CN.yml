dd:
  clap: { }
  usage: |-
    dd [操作数]...
    dd 选项
  about: '复制并可选地转换文件系统资源'
  after_help: |-
    - `bs=字节数` : 一次读写最多字节数（默认值：512）；
    覆盖`ibs`和`obs`。
    - `cbs=字节数` : '转换块大小'（以字节为单位）。适用于
    `conv=block`和`conv=unblock`操作。
    - `conv=转换列表` : 以逗号分隔的转换选项列表或（由于遗留
    原因）文件标志。
    - `count=N` : 在N个ibs大小的读取操作后停止读取输入，而不是
    一直处理到EOF。如果希望在N个字节后停止，请参见`iflag=count_bytes`
    - `ibs=N` : 用于读取的缓冲区大小（默认值：512）
    - `if=文件` : 用于输入的文件。未指定时，使用stdin代替
    - `iflag=标志` : 以逗号分隔的输入标志列表，指定如何处理
    输入源。标志可以是下面指定的任何输入标志或通用标志。
    - `skip=N`（或`iseek=N`）: 在开始复制/转换操作前，跳过输入中的N个ibs大小记录。
    如果希望跳过N个字节，请参见iflag=seek_bytes。
    - `obs=N` : 用于写入的缓冲区大小（默认值：512）
    - `of=文件` : 用于输出的文件。未指定时，使用stdout代替
    - `oflag=标志` : 以逗号分隔的输出标志列表，指定如何处理
    输出源。标志可以是下面指定的任何输出标志或通用标志
    - `seek=N`（或`oseek=N`）: 在开始复制/转换操作前，在输出中寻找N个obs大小的记录。
    如果希望寻找N个字节，请参见oflag=seek_bytes
    - `status=级别` : 控制是否将卷和性能统计信息写入
    stderr。
    未指定时，dd将在完成时打印统计信息。示例如下。
    ```plain
    6+0 records in
    16+0 records out
    8192 bytes (8.2 kB, 8.0 KiB) copied, 0.00057009 s,
    14.4 MB/s
    ```
    前两行是'卷'统计信息，最后一行是'性能'统计信息。
    卷统计信息表示复制期间发生的完整和部分ibs大小读取
    或obs大小写入的数量。卷统计信息的格式是`<完整>+<部分>`。
    如果记录已被截断（请参见`conv=block`），卷统计信息将包含被截断记录的数量。
    可能的级别值有：
    - `progress` : 在复制过程中定期打印性能统计信息。
    - `noxfer` : 打印最终卷统计信息，但不打印性能统计信息。
    - `none` : 不打印任何统计信息。
    打印性能统计信息也可以由INFO信号（如果支持）或USR1信号触发。
    将POSIXLY_CORRECT环境变量设置为任何值（包括空值）将导致USR1信号被忽略。
    - `ascii` : 从EBCDIC转换为ASCII。这是`ebcdic`选项的反向操作。
    隐含`conv=unblock`。
    - `ebcdic` : 从ASCII转换为EBCDIC。这是`ascii`选项的反向操作。
    隐含`conv=block`。
    - `ibm` : 从ASCII转换为EBCDIC，应用POSIX中为`[`、`]`
    和`~`指定的约定。隐含`conv=block`。
    - `ucase` : 从小写转换为大写。
    - `lcase` : 从大写转换为小写。
    - `block` : 对于每个小于cbs=字节数指定大小的换行符，删除
    换行符并用空格填充到cbs。长于cbs的行将被截断。
    - `unblock` : 对于每个大小为cbs=字节数的输入块，删除
    右侧尾随空格并替换为换行符。
    - `sparse` : 当obs大小的块仅由零组成时，尝试定位输出。
    - `swab` : 交换每对相邻的字节。如果存在奇数个字节，
    最后一个字节将被省略。
    - `sync` : 用零填充每个ibs大小的块。如果指定了`block`或`unblock`，
    则用空格填充。
    - `excl` : 必须创建输出文件。如果输出文件已经存在，则失败。
    - `nocreat` : 不会创建输出文件。如果输出文件不存在，则失败。
    - `notrunc` : 输出文件不会被截断。如果未指定此选项，
    输出将在打开时被截断。
    - `noerror` : 所有读取错误都将被忽略。如果未指定此选项，
    dd将只忽略Error::Interrupted。
    - `fdatasync` : 数据将在完成前写入。
    - `fsync` : 数据和元数据将在完成前写入。
    - `count_bytes` : `count=N`的值将被解释为字节。
    - `skip_bytes` : `skip=N`的值将被解释为字节。
    - `fullblock` : 等待每次读取的ibs字节。零长度读取仍被
    视为EOF。
    - `append` : 以追加模式打开文件。考虑同时设置conv=notrunc。
    - `seek_bytes` : seek=N的值将被解释为字节。
    - `direct` : 对数据使用直接I/O。
    - `directory` : 除非给定的输入（如果作为iflag使用）或
    输出（如果作为oflag使用）是目录，否则失败。
    - `dsync` : 对数据使用同步I/O。
    - `sync` : 对数据和元数据使用同步I/O。
    - `nonblock` : 使用非阻塞I/O。
    - `noatime` : 不更新访问时间。
    - `nocache` : 请求操作系统丢弃缓存。
    - `noctty` : 不分配控制终端。
    - `nofollow` : 不跟随系统链接。
