df:
  clap:
    df_opt_help: Print help information.
    df_opt_all: include dummy file systems
    df_opt_total: produce a grand total
    df_opt_human_readable_binary: print sizes in human readable format (e.g., 1K 234M 2G)
    df_opt_human_readable_decimal: likewise, but use powers of 1000 not 1024
    df_opt_inodes: list inode information instead of block usage
    df_opt_kilo: like --block-size=1K
    df_opt_local: limit listing to local file systems
    df_opt_no_sync: do not invoke sync before getting usage info (default)
    df_opt_portability: use the POSIX output format
    df_opt_sync: invoke sync before getting usage info (non-windows only)
    df_opt_print_type: print file system type
  usage: df [OPTION]... [FILE]...
  about: |-
    Show information about the file system on which each FILE resides,
    or all file systems by default.
  after_help: |-
    Display values are in units of the first available SIZE from --block-size,
    and the DF_BLOCK_SIZE, BLOCK_SIZE and BLOCKSIZE environment variables.
    Otherwise, units default to 1024 bytes (or 512 if POSIXLY_CORRECT is set).
    SIZE is an integer and optional unit (example: 10M is 10*1024*1024).
    Units are K, M, G, T, P, E, Z, Y (powers of 1024) or KB, MB,... (powers
    of 1000).
