dir:
  clap: { }
  usage: dir [OPTION]... [FILE]...
  about: |-
    List directory contents.
    Ignore files and directories starting with a '.' by default
  after_help: |-
    The TIME_STYLE argument can be full-iso, long-iso, iso, locale or +FORMAT. FORMAT is interpreted like in date. Also the
    TIME_STYLE environment variable sets the default style to use.
