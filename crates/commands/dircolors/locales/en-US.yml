dircolors:
  clap:
    bourne_shell: output Bourne shell code to set LS_COLORS
    c_shell: output C shell code to set LS_COLORS
    print_database: print the byte counts
    print_ls_colors: output fully escaped colors for display
  usage: dircolors [OPTION]... [FILE]
  about: Output commands to set the LS_COLORS environment variable.
  after_help: |-
    If FILE is specified, read it to determine which colors to use for which
    file types and extensions.  Otherwise, a precompiled database is used.
    For details on the format of these files, run 'dircolors --print-database'
