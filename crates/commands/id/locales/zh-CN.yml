id:
  clap:
    id_effective_user: 仅显示有效用户ID（以数字形式）。
    id_group: 仅显示有效组ID（以数字形式）
    id_ignore: 忽略，为兼容SVR4
  usage: id [选项]... [用户]...
  about: |-
    打印每个指定`用户`的用户和组信息，
    或者（当未指定`用户`时）显示当前用户的信息。
  after_help: |-
    id实用程序将调用进程的用户和组名称及数字ID显示到标准输出。
    如果真实ID和有效ID不同，则两者都会显示，否则只显示真实ID。
    如果指定了用户（登录名或用户ID），则显示该用户的用户和组ID。
    在这种情况下，真实ID和有效ID被假定为相同。
