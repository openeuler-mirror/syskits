join:
  clap:
    v: 类似于-a FILENUM，但抑制已连接的输出行
    e: 使用EMPTY替换缺失的输入字段
    i: 比较字段时忽略大小写差异
    j: 等同于'-1 FIELD -2 FIELD'
    o: 构造输出行时遵循FORMAT
    1: 在文件1的此FIELD上连接
    2: 在文件2的此FIELD上连接
    nocheck-order: 不检查输入是否正确排序
    z: 行分隔符为NUL，而不是换行符
  usage: join [选项]... 文件1 文件2
  about: |-
    对于具有相同连接字段的每对输入行，将一行写入
    标准输出。默认连接字段是第一个，由空格分隔。

    当`文件1`或`文件2`（不能同时）为`-`时，从标准输入读取。
