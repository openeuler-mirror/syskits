ls:
  about: "List directory contents. Ignore entries starting with '.' by default"
  usage: "ls [OPTION]... [FILE]..."
  after_help: "The TIME_STYLE argument can be full-iso, long-iso, iso, locale, or +FORMAT. FORMAT is interpreted like in date. Also the TIME_STYLE environment variable sets the default style to use."
  clap:
    help: "display this help and exit"
    version: "output version information and exit"
    author: "with -l, print the author of each file"
    block_size: "with -l, scale sizes by SIZE when printing them; e.g., '--block-size=M'"
    escape: "print C-style escapes for nongraphic characters"
    ignore_backups: "do not list implied entries ending with ~"
    directory: "list directories themselves, not their contents"
    inode: "print the index number of each file"
    numeric_uid_gid: "like -l, but list numeric user and group IDs"
    literal: "print entry names without quoting"
    hide_control_chars: "print ? instead of nongraphic characters"
    show_control_chars: "show nongraphic characters as-is"
    quote_name: "enclose entry names in double quotes"
    reverse: "reverse order while sorting"
    recursive: "list subdirectories recursively"
    size: "print the allocated size of each file, in blocks"
    human_readable: "with -l and -s, print sizes like 1K 234M 2G etc."
    si: "likewise, but use powers of 1000 not 1024"
    dereference: "when showing file information for a symbolic link, show the information for the file the link references"
    dereference_command_line: "follow symbolic links listed on the command line"
    dereference_command_line_symlink_to_dir: "follow each command line symbolic link that points to a directory"
    hide: "do not list implied entries matching shell PATTERN"
    ignore: "do not list implied entries matching shell PATTERN"
    context: "print any security context of each file"
    group_directories_first: "group directories before files"
    zero: "end each output line with NUL, not newline"
    dired: "generate output designed for Emacs' dired mode"
    hyperlink: "hyperlink file names"
  errors:
    invalid_line_width: "invalid line width"
    io_error: "general io error"
    block_size_parse_error: "invalid --block-size argument"
    conflicting_argument_dired: "--dired requires --format=long"
    dired_and_zero_incompatible: "--dired and --zero are incompatible"
    already_listed: "already listed"
    time_style_parse_error: "invalid --time-style argument"
    no_such_file: "cannot access '%{path}': No such file or directory"
    operation_not_permitted: "cannot access '%{path}': Operation not permitted"
    permission_denied: "cannot access '%{path}': Permission denied" 