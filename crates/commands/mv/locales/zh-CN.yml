mv:
  clap:
    opt_force: 覆盖前不提示
    opt_interactive: 覆盖前提示
    opt_no_clobber: 不覆盖已存在的文件
    opt_strip_trailing_slashes: 删除每个源参数末尾的斜杠
    opt_target_directory: 将所有源参数移动到目录中
    opt_no_target_directory: 将目标视为普通文件
    opt_verbose: 说明正在执行的操作
    opt_context: 将目标文件的SELinux安全上下文设置为默认类型
    opt_debug: 解释文件是如何被复制的（注意，这意味着开启 -v 选项）
    opt_no_copy: 如果重命名失败，则不执行复制操作
  usage: |-
    mv [选项]... [-T] 源文件 目标文件
    mv [选项]... 源文件... 目录
    mv [选项]... -t 目录 源文件...
  about: '将源文件移动到目标文件，或将多个源文件移动到目录。'
  after_help: |-
    当指定多个-i、-f、-n选项时，只有最后一个会生效。
    对于修改时间与目标文件相同或更新的非目录文件，不进行移动；
    而是静默跳过该文件而不报错。如果移动跨越文件系统边界，则比较的是源时间戳
    截断到目标文件系统分辨率和用于更新时间戳的系统调用分辨率；这避免了使用
    相同源和目标执行多个`mv -u`命令时重复工作。如果同时指定了`-n`或`--no-clobber`
    选项，则忽略此选项。这提供了更多控制替换目标中现有文件的选项，其值可以是以下之一：
    * `all`    这是未指定`--update`选项时的默认操作，会导致目标中所有现有文件被替换。
    * `none`   这类似于`--no-clobber`选项，不会替换目标中的任何文件，但跳过文件也不会导致失败。
    * `older`  这是指定`--update`时的默认操作，如果目标文件比相应的源文件旧，则会被替换。
