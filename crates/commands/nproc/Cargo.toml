[package]
name = "ct_nproc"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "nproc ~ (ctutils) display the number of processing units available"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/crates/commands/nproc"

[lib]
path = "src/nproc.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
libc = { workspace = true }
clap = { workspace = true }
ctcore = { workspace = true, features = ["fs"] }

[[bin]]
name = "nproc"
path = "src/main.rs"
