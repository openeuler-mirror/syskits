od:
  clap:
    od_help: 打印帮助信息。
    od_address_radix: 选择打印文件偏移量的进制。
    od_skip_bytes: 在格式化和写入前跳过输入字节。
    od_read_bytes: 将转储限制为指定的输入字节数
    od_endian: 多字节格式使用的字节顺序
    a: 命名字符，忽略高位
    b: 八进制字节
    c: ASCII字符或反斜杠转义
    d: 无符号十进制4字节单位
    o: 八进制4字节单位
    i: 十进制4字节单位
    l: 十进制8字节单位
    x: 十六进制4字节单位
    h: 十六进制4字节单位
    s: 十进制2字节单位
    e: 浮点双精度（64位）单位
    f: 浮点双精度（64位）单位
    od_format: 选择输出格式
    od_output_duplicates: 不使用*标记行抑制
    od_traditional: 与单个输入、偏移量和标签的兼容模式。
  usage: |-
    od [选项]... [--] [文件名]...
    od [-abcdDefFhHiIlLoOsxX] [文件名] [[+][0x]偏移量[.][b]]
    od --traditional [选项]... [文件名] [[+][0x]偏移量[.][b] [[+][0x]标签[.][b]]]
  about: '以八进制和其他格式转储文件'
  after_help: |-
    以各种人类可读格式显示数据。如果指定了多种格式，
    输出将按照它们在命令行上出现的顺序包含所有格式。每种格式将在新行上打印。
    只有包含第一种格式的行将以偏移量为前缀。
    如果未指定文件名，或者为"-"，将使用标准输入。在"--"之后，
    不会识别更多选项。这允许使用以"-"开头的文件名。
    如果文件名是可用作第二种形式中偏移量的有效数字，您可以强制将其识别为文件名，
    方法是包含仅在第一种形式中有效的选项，如"-j0"。
    进制是o、d、x、n之一，分别表示八进制、十进制、十六进制或无。
    字节数默认为十进制，如果前缀为"0"则为八进制，如果前缀为"0x"则为十六进制。
    后缀b、KB、K、MB、M、GB、G将使数字分别乘以512、1000、1024、1000^2、1024^2、1000^3、1024^3、1000^2、1024^2。
    偏移量和标签默认为八进制，如果前缀为"0x"则为十六进制，如果添加"."后缀则为十进制。
    "b"后缀将乘以512。
    类型包含一个或多个格式规范，包括：
    a       表示可打印的7位ASCII
    c       表示utf-8字符或未定义字符的八进制
    d[大小] 表示有符号十进制
    f[大小] 表示浮点数
    o[大小] 表示八进制
    u[大小] 表示无符号十进制
    x[大小] 表示十六进制
    大小是字节数，可以是1、2、4、8或16，
    或者对于整数类型，C、I、S、L分别表示1、2、4、8字节，
    或者对于浮点数，F、D、L分别表示4、8、16字节。
    任何类型规范都可以有"z"后缀，这将在行尾添加ASCII转储。
    如果发生错误，将向stderr打印诊断消息，退出码将为非零值。
