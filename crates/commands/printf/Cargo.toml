[package]
name = "ct_printf"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "printf ~ (ctutils) FORMAT and display ARGUMENTS"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/crates/commands/printf"

[lib]
path = "src/printf.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
clap = { workspace = true }
ctcore = { workspace = true, features = ["format", "quoting-style"] }

[[bin]]
name = "printf"
path = "src/main.rs"
