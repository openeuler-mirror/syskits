rm:
  clap:
    rm_force: ignore nonexistent files and arguments, never prompt
    rm_prompt: prompt before every removal
    rm_no_preserve_root: do not treat '/' specially
    rm_preserve_root: do not remove '/' (default)
    rm_recursive: remove directories and their contents recursively
    rm_dir: remove empty directories
    rm_verbose: explain what is being done
  usage: rm [OPTION]... FILE...
  about: Remove (unlink) the FILE(s)
  after_help: |-
    By default, rm does not remove directories.  Use the --recursive (-r or -R)
    option to remove each listed directory, too, along with all of its contents
    To remove a file whose name starts with a '-', for example '-foo',
    use one of these commands:
    rm -- -foo
    rm ./-foo
    Note that if you use rm to remove a file, it might be possible to recover
    some of its contents, given sufficient expertise and/or time.  For greater
    assurance that the contents are truly unrecoverable, consider using shred.
