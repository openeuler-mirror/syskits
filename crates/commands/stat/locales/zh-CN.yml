dereference: "跟踪符号链接"
file-system: "显示文件系统状态而非文件状态"
terse: "以简洁格式打印信息"
format: "使用指定的FORMAT替代默认格式;每次使用FORMAT后输出换行符"
printf: |
  类似于 --format,但会解释反斜杠转义符,
  且不强制在末尾输出换行符;
  如需换行,请在 FORMAT 中包含 \n

help: "打印帮助信息"
version: "打印版本信息"
about: "显示文件或文件系统的状态。"
usage: "用法: stat [选项]... 文件..."
long_usage:
  "文件的有效格式序列（无 `--file-system`）:\n
  \n
  - `%a`: 八进制访问权限（注意 `#` 和 `0` 的 `printf` 标志）\n
  - `%A`: 人类可读形式的访问权限\n
  - `%b`: 分配的块数（参见 `%B`）\n
  - `%B`: `%b` 报告的每个块的字节大小\n
  - `%C`: SELinux 安全上下文字符串\n
  - `%d`: 十进制设备号\n
  - `%D`: 十六进制设备号\n
  - `%f`: 原始模式的十六进制表示\n
  - `%F`: 文件类型\n
  - `%g`: 文件所有者的组 ID\n
  - `%G`: 文件所有者的组名\n
  - `%h`: 硬链接数\n
  - `%i`: inode 号\n
  - `%m`: 挂载点\n
  - `%n`: 文件名\n
  - `%N`: 带符号链接的引用文件名（如果存在）\n
  - `%o`: 最优 I/O 传输大小提示\n
  - `%s`: 总大小，以字节为单位\n
  - `%t`: 主设备类型的十六进制表示，适用于字符/块设备特殊文件\n
  - `%T`: 次设备类型的十六进制表示，适用于字符/块设备特殊文件\n
  - `%u`: 文件所有者的用户 ID\n
  - `%U`: 文件所有者的用户名\n
  - `%w`: 文件创建时间，人类可读；如果未知则显示 `-`\n
  - `%W`: 文件创建时间，自纪元以来的秒数；如果未知则为 `0`\n
  - `%x`: 最后访问时间，人类可读\n
  - `%X`: 最后访问时间，自纪元以来的秒数\n
  - `%y`: 最后数据修改时间，人类可读\n
  - `%Y`: 最后数据修改时间，自纪元以来的秒数\n
  - `%z`: 最后状态更改时间，人类可读\n
  - `%Z`: 最后状态更改时间，自纪元以来的秒数\n

  文件系统的有效格式序列:\n
  \n
  - `%a`: 非超级用户可用的空闲块数\n
  - `%b`: 文件系统中的总数据块数\n
  - `%c`: 文件系统中的总文件节点数\n
  - `%d`: 文件系统中的空闲文件节点数\n
  - `%f`: 文件系统中的空闲块数\n
  - `%i`: 文件系统 ID 的十六进制表示\n
  - `%l`: 文件名的最大长度\n
  - `%n`: 文件名\n
  - `%s`: 块大小（用于更快的传输）\n
  - `%S`: 基本块大小（用于块计数）\n
  - `%t`: 文件系统的类型，十六进制表示\n
  - `%T`: 文件系统的类型，人类可读形式\n

  注意：你的 shell 可能有自己的 stat 版本，通常会覆盖此处描述的版本。请参考你 shell 的文档以获取支持选项的详细信息。"