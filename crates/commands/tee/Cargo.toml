[package]
name = "ct_tee"

version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true

description = "tee ~ (ctutils) display input and copy to FILE"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/crates/commands/tee"

[lib]
path = "src/tee.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
clap = { workspace = true }
ctcore = { workspace = true, features = ["libc", "signals"] }
tempfile = { workspace = true }

[[bin]]
name = "tee"
path = "src/main.rs"
