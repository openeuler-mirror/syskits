tee:
  clap:
    tee_append: append to the given FILEs, do not overwrite
    tee_ignore_interrupts: ignore interrupt signals (ignored on non-Unix platforms)
    tee_ignore_pipe_errors: set write error behavior (ignored on non-Unix platforms)
    tee_output_error: produce warnings for errors writing to any output
  usage: tee [OPTION]... [FILE]...
  about: Copy standard input to each FILE, and also to standard output.
  after_help: If a FILE is -, it refers to a file named - .
