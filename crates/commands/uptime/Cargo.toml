[package]
name = "ct_uptime"
version.workspace = true
authors.workspace = true
license.workspace = true
description = "uptime ~ (ctutils) display dynamic system information"

homepage.workspace = true
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/crates/commands/uptime"
keywords.workspace = true
categories.workspace = true
edition.workspace = true

[lib]
path = "src/uptime.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
ctcore = { workspace = true, features = ["libc", "utmpx"] }
[dev-dependencies]
tempfile = { workspace = true }
[[bin]]
name = "uptime"
path = "src/main.rs"
