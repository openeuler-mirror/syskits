[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
clap = { workspace = true }
ctcore = { workspace = true, features = ["utmpx"] }
[dev-dependencies]
tempfile = { workspace = true }
[[bin]]
name = "users"
path = "src/main.rs"
