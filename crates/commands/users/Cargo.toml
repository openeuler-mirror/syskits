[package]
name = "ct_users"
version.workspace = true
authors.workspace = true
license.workspace = true
description = "users ~ (ctutils) display names of currently logged-in users"

homepage.workspace = true
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/crates/commands/users"
keywords.workspace = true
categories.workspace = true
edition.workspace = true

[lib]
