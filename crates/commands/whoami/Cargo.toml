[package]
name = "ct_whoami"
version.workspace = true
authors.workspace = true
license.workspace = true
categories.workspace = true
edition.workspace = true
keywords.workspace = true
homepage.workspace = true

description = "whoami ~ (ctutils) display user name of current effective user ID"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/crates/commands/whoami"

[lib]
path = "src/whoami.rs"

[dependencies]
clap = { workspace = true }
ctcore = { workspace = true, features = ["entries", "process"] }
rust-i18n = { workspace = true }
sys-locale = { workspace = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { workspace = true, features = [
    "Win32_NetworkManagement_NetManagement",
    "Win32_System_WindowsProgramming",
    "Win32_Foundation",
] }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[[bin]]
name = "whoami"
path = "src/main.rs"
