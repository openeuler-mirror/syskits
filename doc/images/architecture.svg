<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8f9fa" rx="10" ry="10"/>
  
  <!-- 标题 -->
  <text x="400" y="30" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">syskits 架构组件关系图</text>
  
  <!-- 用户 -->
  <rect x="350" y="60" width="100" height="40" rx="5" ry="5" fill="#d6e9ff" stroke="#4a86e8" stroke-width="2"/>
  <text x="400" y="85" font-family="Arial" font-size="14" text-anchor="middle">用户</text>
  
  <!-- 调用箭头 -->
  <line x1="400" y1="100" x2="400" y2="130" stroke="#505050" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="415" y="120" font-family="Arial" font-size="10">调用</text>
  
  <!-- syskits主应用 -->
  <rect x="300" y="140" width="200" height="50" rx="5" ry="5" fill="#ffdf9e" stroke="#e69138" stroke-width="2"/>
  <text x="400" y="170" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">syskits主应用</text>
  
  <!-- 工具派生宏 -->
  <rect x="20" y="140" width="180" height="50" rx="5" ry="5" fill="#d5a6bd" stroke="#a64d79" stroke-width="2"/>
  <text x="110" y="170" font-family="Arial" font-size="14" text-anchor="middle">tool_derive过程宏</text>
  
  <!-- 宏到主应用箭头 -->
  <line x1="200" y1="165" x2="290" y2="165" stroke="#505050" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="215" y="155" font-family="Arial" font-size="10">编译时代码生成</text>
  
  <!-- ctcore核心库 -->
  <rect x="600" y="140" width="180" height="50" rx="5" ry="5" fill="#a2c4c9" stroke="#45818e" stroke-width="2"/>
  <text x="680" y="170" font-family="Arial" font-size="14" text-anchor="middle">ctcore核心库</text>
  
  <!-- 主应用到核心库箭头 -->
  <line x1="500" y1="165" x2="590" y2="165" stroke="#505050" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="530" y="155" font-family="Arial" font-size="10">依赖</text>
  
  <!-- 主应用到工具箭头 -->
  <path d="M400 190 L400 220" stroke="#505050" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="430" y="210" font-family="Arial" font-size="10">分发命令</text>
  
  <!-- 工具区域 -->
  <rect x="150" y="230" width="500" height="160" rx="10" ry="10" fill="#e6f2d9" stroke="#6aa84f" stroke-width="2"/>
  <text x="400" y="250" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">命令行工具</text>
  
  <!-- 各个工具 -->
  <rect x="180" y="270" width="80" height="40" rx="5" ry="5" fill="#d9ead3" stroke="#6aa84f" stroke-width="1"/>
  <text x="220" y="295" font-family="Arial" font-size="14" text-anchor="middle">ls</text>
  
  <rect x="280" y="270" width="80" height="40" rx="5" ry="5" fill="#d9ead3" stroke="#6aa84f" stroke-width="1"/>
  <text x="320" y="295" font-family="Arial" font-size="14" text-anchor="middle">cat</text>
  
  <rect x="380" y="270" width="80" height="40" rx="5" ry="5" fill="#d9ead3" stroke="#6aa84f" stroke-width="1"/>
  <text x="420" y="295" font-family="Arial" font-size="14" text-anchor="middle">cp</text>
  
  <rect x="480" y="270" width="80" height="40" rx="5" ry="5" fill="#d9ead3" stroke="#6aa84f" stroke-width="1"/>
  <text x="520" y="295" font-family="Arial" font-size="14" text-anchor="middle">rm</text>
  
  <rect x="330" y="330" width="80" height="40" rx="5" ry="5" fill="#d9ead3" stroke="#6aa84f" stroke-width="1"/>
  <text x="370" y="355" font-family="Arial" font-size="14" text-anchor="middle">...</text>
  
  <!-- 工具到核心库箭头 - 修改后的连接方式 -->
  <path d="M690 190 L690 310" stroke="#505050" stroke-width="2"/>
  <line x1="690" y1="310" x2="650" y2="310" stroke="#505050" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="700" y="300" font-family="Arial" font-size="10">依赖</text>
  
  <!-- 输出箭头 -->
  <path d="M400 390 L400 420" stroke="#505050" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="430" y="410" font-family="Arial" font-size="10">输出</text>
  
  <!-- 终端输出 -->
  <rect x="300" y="430" width="200" height="40" rx="5" ry="5" fill="#fff2cc" stroke="#f1c232" stroke-width="2"/>
  <text x="400" y="455" font-family="Arial" font-size="14" text-anchor="middle">终端/文件系统输出</text>
  
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#505050"/>
    </marker>
  </defs>
</svg>