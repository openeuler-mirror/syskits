[package]
name = "ct_arch"
version = "0.0.1"
authors = ["cttils developers"]
license = "MIT"
description = "arch ~ (cttils) display machine architecture"

homepage = "https://github.com/cttils/coreutils"
repository = "https://github.com/cttils/coreutils/tree/main/src/ct/arch"
keywords = ["syskits", "cttils", "cross-platform", "cli", "utility"]
categories = ["command-line-utilities"]
edition = "2021"

[lib]
path = "src/arch.rs"

[dependencies]
platform-info = { workspace = true }
clap = { workspace = true }
ctcore = { workspace = true }

[[bin]]
name = "arch"
path = "src/main.rs"
