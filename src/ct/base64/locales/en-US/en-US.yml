base64:
  clap:
    base_decode: decode data
    base_ignore_garbage: when decoding, ignore non-alphabetic characters
    base_wrap: wrap encoded lines after COLS character (default 76, 0 to disable wrapping)
  usage: base64 [OPTION]... [FILE]
  about: |-
    encode/decode data and print to standard output
    With no FILE, or when FILE is -, read standard input.

    The data are encoded as described for the base64 alphabet in RFC 3548.
    When decoding, the input may contain newlines in addition
    to the bytes of the formal base64 alphabet. Use --ignore-garbage
    to attempt to recover from any other non-alphabet bytes in the
    encoded stream.
