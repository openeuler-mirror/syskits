[package]
name = "ct_chown"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "chown ~ (ctutils) change the ownership of FILE"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/chown"

[lib]
path = "src/chown.rs"

[dependencies]
clap = { workspace = true }
ctcore = { workspace = true, features = ["entries", "fs", "perms"] }

[dev-dependencies]
tempfile = { workspace = true }

[[bin]]
name = "chown"
path = "src/main.rs"
