comm:
  clap:
    column_1: suppress column 1 (lines unique to FILE1)
    column_2: suppress column 2 (lines unique to FILE2)
    column_3: suppress column 3 (lines that appear in both files)
    delimiter: separate columns with STR
    zero_terminated: line delimiter is NUL, not newline
    total: output a summary
  usage: comm [OPTION]... FILE1 FILE2
  about: |-
    Compare two sorted files line by line.

    When FILE1 or FILE2 (not both) is -, read standard input.

    With no options, produce three-column output. Column one contains
    lines unique to FILE1, column two contains lines unique to FILE2,
    and column three contains lines common to both files.
