comm:
  clap:
    column_1: 不显示第1列（文件1特有的行）
    column_2: 不显示第2列（文件2特有的行）
    column_3: 不显示第3列（两个文件中都有的行）
    delimiter: 使用STR分隔列
    zero_terminated: 行分隔符是NUL，不是换行符
    total: 输出摘要
  usage: comm [选项]... 文件1 文件2
  about: |-
    逐行比较两个已排序的文件。

    当文件1或文件2（不能同时）是-时，从标准输入读取。

    不带选项时，生成三列输出。第一列包含文件1特有的行，
    第二列包含文件2特有的行，第三列包含两个文件共有的行。
