[package]
name = "ct_df"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "df ~ (ctutils) display file system information"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/cp"

[lib]
path = "src/df.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
clap = { workspace = true }
ctcore = { workspace = true, features = ["libc", "fsext"] }
unicode-width = { workspace = true }

[dev-dependencies]
tempfile = "3"

[[bin]]
name = "df"
path = "src/main.rs"
