echo:
  clap:
    no_newline: 不输出末尾的换行符
    enable_backslash_escape: 启用对反斜杠转义的解释
    disable_backslash_escape: 禁用对反斜杠转义的解释（默认）
  usage: echo [选项]... [字符串]...
  about: '显示一行文本'
  after_help: |-
    将字符串输出到标准输出。
    如果-e生效，以下序列将被识别：
    - `\`       反斜杠
    - `\a`      警告音（BEL）
    - `\b`      退格
    - `\c`      不再产生更多输出
    - `\e`      转义
    - `\f`      换页
    - `\n`      换行
    - `\r`      回车
    - `\t`      水平制表符
    - `\v`      垂直制表符
    - `\0NNN`   八进制值为NNN的字节（1到3位数字）
    - `\xHH`    十六进制值为HH的字节（1到2位数字）
