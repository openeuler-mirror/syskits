[package]
name = "ct_factor"

version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "factor ~ (ctutils) display the prime factors of each NUMBER"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/"
default-run = "factor"


[build-dependencies]
num-traits = { workspace = true } # used in src/numerics.rs, which is included by build.rs

[dependencies]
clap = { workspace = true }
coz = { workspace = true, optional = true }
num-traits = { workspace = true }
rand = { workspace = true }
smallvec = { workspace = true }
ctcore = { workspace = true }
gcd = { workspace = true }
num-modular = { workspace = true }
num-prime = { workspace = true }

[dev-dependencies]
quickcheck = "1.0.3"

[[bin]]
name = "factor"
path = "src/main.rs"

[[bin]]
name = "generate_prime_table"
path = "tools/generate_prime_table.rs"

[lib]
path = "src/cli.rs"
