[package]
name = "ct_head"
version.workspace = true
authors.workspace = true
license.workspace = true
description = "head ~ (ctutils) display the first lines of input"

homepage.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true

repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/head"

[lib]
path = "src/head.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
clap = { workspace = true }
memchr = { workspace = true }
ctcore = { workspace = true, features = ["ringbuffer", "lines"] }
tempfile = "3.5.0"

[[bin]]
name = "head"
path = "src/main.rs"

