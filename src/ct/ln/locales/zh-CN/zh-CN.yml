ln:
  clap:
    ln_force: 删除已存在的目标文件
    ln_interactive: 提示是否删除已存在的目标文件
    ln_logical: 跟随作为符号链接的目标
    ln_physical: 直接对符号链接创建硬链接
    ln_symbolic: 创建符号链接而不是硬链接
    ln_target_directory: 指定创建链接的目录
    ln_no_target_directory: 始终将链接名称视为普通文件
    ln_relative: 创建相对于链接位置的符号链接
    ln_verbose: 打印每个链接文件的名称
  usage: |-
    ln [选项]... [-T] 目标 链接名称
    ln [选项]... 目标
    ln [选项]... 目标... 目录
    ln [选项]... -t 目录 目标...
  about: '在文件之间创建链接。'
  after_help: |-
    在第1种形式中，创建一个指向目标的名为链接名称的链接。
    在第2种形式中，在当前目录中创建一个指向目标的链接。
    在第3和第4种形式中，在目录中为每个目标创建链接。
    默认创建硬链接，使用--symbolic创建符号链接。
    默认情况下，每个目标（新链接的名称）不应该已经存在。
    创建硬链接时，每个目标必须存在。符号链接
    可以包含任意文本；如果后来被解析，相对链接是
    相对于其父目录进行解释的。
