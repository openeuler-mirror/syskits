[package]
name = "ct_mknod"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "mknod ~ (ctutils) create special file NAME of TYPE"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/mknod"

[lib]
name = "ct_mknod"
path = "src/mknod.rs"

[dependencies]
clap = { workspace = true }
libc = { workspace = true }
ctcore = { workspace = true, features = ["mode"] }

[[bin]]
name = "mknod"
path = "src/main.rs"
