more:
  clap:
    more_print_over: Do not scroll, display text and clean line ends
    more_silent: Display help instead of ringing bell
    more_clean_print: Do not scroll, clean screen and display text
    more_squeeze: Squeeze multiple blank lines into one
    more_pattern: Display file beginning from pattern match
    more_files: Path to the files to be read
  usage: more [OPTIONS] FILE...
  about: Display the contents of a text file
