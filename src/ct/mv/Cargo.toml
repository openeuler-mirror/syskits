[package]
name = "ct_mv"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "mv ~ (ctutils) move (rename) SOURCE to DESTINATION"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/mv"

[lib]
path = "src/mv.rs"

[dependencies]
clap = { workspace = true }
fs_extra = { workspace = true }
indicatif = { workspace = true }
ctcore = { workspace = true, features = [
  "backup-control",
  "fs",
  "fsxattr",
  "update-control",
] }
tempfile = { workspace = true }
selinux = { workspace = true, optional = true }

[features]
selinux = ["dep:selinux"]

[[bin]]
name = "mv"
path = "src/main.rs"

