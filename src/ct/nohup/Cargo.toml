[package]
name = "ct_nohup"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "nohup ~ (ctutils) run COMMAND, ignoring hangup signals"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/nohup"

[lib]
path = "src/nohup.rs"

[dependencies]
clap = { workspace = true }
libc = { workspace = true }
ctcore = { workspace = true, features = ["fs"] }

[[bin]]
name = "nohup"
path = "src/main.rs"
