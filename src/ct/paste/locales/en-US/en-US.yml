paste:
  clap:
    paste_serial: paste one file at a time instead of in parallel
    paste_delimiter: reuse characters from LIST instead of TABs
    paste_zero_terminated: line delimiter is NUL, not newline
  usage: paste [OPTIONS] [FILE]...
  about: |-
    Write lines consisting of the sequentially corresponding lines from each
    `FILE`, separated by `TAB`s, to standard output.
