[package]
name = "ct_pinky"

version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true

description = "pinky ~ (ctutils) display user information"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/pinky"

[lib]
path = "src/pinky.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
clap = { workspace = true }
ctcore = { workspace = true, features = ["utmpx", "entries"] }

[[bin]]
name = "pinky"
path = "src/main.rs"
