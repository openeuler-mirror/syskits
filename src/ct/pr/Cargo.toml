[package]
name = "ct_pr"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "pr ~ (ctutils) convert text files for printing"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/pr"

[lib]
path = "src/pr.rs"

[dependencies]
clap = { workspace = true }
ctcore = { workspace = true, features = ["entries"] }
quick-error = { workspace = true }
itertools = { workspace = true }
regex = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
nix = { workspace = true }

[[bin]]
name = "pr"
path = "src/main.rs"
