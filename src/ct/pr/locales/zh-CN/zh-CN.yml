pr:
  clap:
    pr_pages: 从页面FIRST_PAGE[:LAST_PAGE]开始和停止打印
    pr_first_line_number: 在打印的第一页的第一行从NUMBER开始计数
    pr_no_file_warnings: 当无法打开文件时不显示警告
    pr_help: 打印帮助信息
  usage: pr [选项]... [文件]...
  about: '将给定文件或标准输入的内容以分页过滤器输出到标准输出'
  after_help: |-
    `+PAGE`           从格式化输入的PAGE页码开始输出。
    `-COLUMN`         生成多列输出。请参见 `--column`
    pr实用程序是文本文件的打印和分页过滤器。
    当指定多个输入文件时，每个文件都会被读取、格式化并写入标准输出。
    默认情况下，输入被分成66行的页面，每页包含：
    * 一个5行的页眉，包含页码、日期、时间和文件路径名。
    * 一个由空行组成的5行页脚。
    如果标准输出与终端关联，诊断消息将被抑制，直到pr
    实用程序完成处理。
    当指定多列输出时，文本列的宽度相等。
    默认情况下，文本列之间至少有一个`<空格>`分隔。
    不适合文本列的输入行将被截断。
    在单列输出下，行不会被截断。
