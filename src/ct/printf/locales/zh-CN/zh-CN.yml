printf:
  clap:
    printf_help: 打印帮助信息
    printf_version: 打印版本信息
  usage: |-
    printf 格式字符串 [参数]...
    printf 格式 [参数]...
    printf 选项
  about: '根据格式字符串和后续参数打印输出。'
  after_help: |-
    基本匿名字符串模板：
    至少打印一次格式字符串，只要还有剩余参数就会重复打印
    输出将格式字符串中的转义字面量作为字符字面量打印
    输出用下一个未使用的参数替换匿名字段，根据字段格式化。
    打印`,`，用字符字面量替换转义字符序列，
    用传递的参数替换替换字段序列，
    字面上地，除了下面的
    转义字符序列和后面描述的替换序列。
    以下转义序列（按字母顺序排列）
    将打印相应的字符字面量：
    * `\"`      双引号
    * `\\\\`    反斜杠
    * `\\a`     警告（BEL）
    * `\\b`     退格
    * `\\c`     输入结束
    * `\\e`     转义
    * `\\f`     换页
    * `\\n`     新行
    * `\\r`     回车
    * `\\t`     水平制表符
    * `\\v`     垂直制表符
    * `\\NNN`   以八进制值NNN表示的字节值（1至3位数字）
    大于256的值将被处理
    * `\\xHH`   以十六进制值NN表示的字节值（1至2位数字）
    * `\\uHHHH` 以十六进制值HHHH表示的Unicode（IEC 10646）字符（4位数字）
    * `\\uHHHH` 以十六进制值HHHH表示的Unicode字符（8位数字）
    * `%%`      单个%
    字段
    * `%s`：字符串
    * `%b`：解析为字面量的字符串，第二个参数是最大长度
    * `%c`：字符，没有第二个参数
    * `%i`或`%d`：64位整数
    * `%u`：64位无符号整数
    * `%x`或`%X`：以十六进制表示的64位无符号整数
    * `%o`：以八进制表示的64位无符号整数
    第二个参数是最小宽度，整数
    低于该宽度的输出用前导零填充
    * `%q`：ARGUMENT以可重用为shell输入的格式打印，使用提议的POSIX $''语法转义非打印字符。
    * `%f`或`%F`：十进制浮点值
    * `%e`或`%E`：科学记数法浮点值
    * `%g`或`%G`：特别解释的十进制或科学记数法浮点值中较短的一个。
    第二个参数是
    `-max`浮点输出中小数点后的位数
    `-max`科学记数法输出中的有效数字位数
    参数化字段
    示例：
    ```
    printf '%4.3i' 7
    ```
    它有一个第一参数4和第二参数3，结果为' 007'
    ```
    printf '%.1s' abcde
    ```
    它没有第一参数，第二参数为1，结果为'a'
    ```
    printf '%4c' q
    ```
    它有一个第一参数4，没有第二参数，结果为'   q'
    字段的第一个参数是填充输出的最小宽度
    如果输出小于此宽度的绝对值，
    将用前导空格填充，或者，如果参数为负值，
    用尾随空格填充。默认值为零。
    字段的第二个参数特定于输出字段类型。
    默认值可在下面的完整替换帮助中找到
    数字参数的特殊前缀
    * `0`：（例如010）将参数解释为八进制（仅限整数输出字段）
    * `0x`：（例如0xABC）将参数解释为十六进制（仅限数字输出字段）
    * `\'`：（例如\'a）将参数解释为字符常量
    替换用于将额外参数传递到格式字符串中，以特定方式格式化。例如：
    ```
    printf '字母%X在字母%X之前' 10 11
    ```
    将打印
    ```
    字母A在字母B之前
    ```
    因为替换字段`%X`表示
    '取一个整数参数并将其写为十六进制数'
    传递比格式字符串中更多的参数将导致格式字符串
    对剩余替换重复
    ```
    printf '它是%i华氏度，在%s \n' 22 波特兰 25 波士顿 27 纽约
    ```
    将打印
    ```
    它是22华氏度，在波特兰
    它是25华氏度，在波士顿
    它是27华氏度，在波士顿
    ```
    如果打印格式字符串但剩余参数少于
    替换字段，没有参数的替换字段将
    默认为空字符串，或对于数字字段
    值为0
    这个程序，像GNU coreutils printf一样，
    解释POSIX C printf规范的修改子集，
    下面是替换的快速参考。
    所有字符串字段都有'最大宽度'参数
    `%.3s`表示'打印原始输入的不超过三个字符'
    * `%s`：字符串
    * `%b`：转义字符串 - 将检查字符串中是否有上面转义字面量列表中的任何转义字面量，并将它们转换为字面字符。
    例如，`\\n`将被转换为换行符。
    关于`%b`模式的一个特殊规则是八进制字面量的解释方式不同
    在由`%b`传递的参数中，传递八进制解释的字面量必须采用`\\0NNN`形式
    而不是`\\NNN`。（尽管出于传统原因，`\\NNN`形式的八进制字面量仍将
    被解释且不会发出警告，但如果你将此用于代码以零开头的字面量，将会遇到问题，因为它将被视为`\\0NNN`形式。）
    * `%q`：转义字符串 - 使用大多数shell可以重用为输入的格式的字符串。
    非打印字符使用POSIX提议的'$'''语法转义，
    shell元字符被适当引用。
    这是与ls --quoting=shell-escape输出等效的格式。
    字符字段没有辅助参数。
    * `%c`：单个字符
    所有整数字段都有'用零填充'参数
    `%.4i`表示一个整数，如果它的长度少于4位数字，
    则用前导零填充，直到长度为4位数字。
    * `%d`或`%i`：64位整数
    * `%u`：64位无符号整数
    * `%x`或`%X`：以十六进制（16进制）打印的64位无符号整数
    使用`%X`而不是`%x`表示使用大写字母表示'a'到'f'
    * `%o`：以八进制（8进制）打印的64位无符号整数
    所有浮点字段都有'最大小数位/最大有效数字'参数
    `%.10f`表示小数点后有7位小数的十进制浮点数
    `%.10e`表示有10位有效数字的科学记数法数字
    `%.10g`表示十进制和科学记数法分别相同的行为，并提供各自输出中较短的一个。
    与GNU coreutils一样，这些输出中小数点后的值首先作为
    双精度解析，然后呈现为文本。对于这两种实现，不要期望
    第18位小数后有有意义的精度。当使用18位或
    更高的小数位数时，您可以预期在第18位小数处，GNU coreutils printf和这个printf之间的输出变化为+/- 1
    * `%f`：以十进制表示的浮点值，默认截断并显示到小数点后6位。
    没有与Coreutils printf的双精度后行为对等，值不会
    超出输入值进行估计或调整。
    * `%e`或`%E`：以科学记数法表示的浮点值
    默认7位有效数字
    `%E`表示对尾数使用大写E。
    * `%g`或`%G`：以十进制和科学记数法中较短的形式表示的浮点值
    与`%f`和`%E`的行为不同，完整详情请参阅posix printf规范，
    一些不同行为的例子：
    科学记数法默认有6位有效数字
    去除尾随零
    最后一位后的数字四舍五入而不是截断
    像本工具中的其他行为一样，浮点
    行为的设计选择旨在从输入和输出角度精确
    再现GNU coreutils的printf行为。
    大多数替换字段可以使用最多2个数字进行参数化，
    这些数字可以在%符号和字段字母之间传递给字段。
    第一个参数始终表示输出的最小宽度，它对创建
    列式输出很有用。任何小于此最小宽度的输出都用
    前导空格填充
    第二个参数前面有一个点。
    你不必使用参数
    对于数字输入，除了十进制外，还接受以下附加形式的输入：
    八进制（仅限整数）：如果参数以0开头，后面的字符
    将被解释为八进制（8进制）整数字段
    十六进制：如果参数以0x开头，后面的字符将被解释
    将被解释为任何数字字段的十六进制（16进制）
    对于浮点字段，十六进制输入导致精度
    限制（在转换小数点后的输入时）为10^-15
    字符常量：如果参数以单引号字符开头，下一个字符的第一个字节
    将被解释为8位无符号整数。如果有
    额外的字节，它们将引发错误（除非设置了环境变量POSIXLY_CORRECT）
