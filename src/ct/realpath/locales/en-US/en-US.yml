realpath:
  clap:
    realpath_quiet: Do not print warnings for invalid paths
    realpath_strip: Only strip '.' and '..' components, but don't resolve symbolic links
    realpath_zero: Separate output filenames with \\0 rather than newline
    realpath_logical: resolve '..' components before symlinks
    realpath_physical: resolve symlinks as encountered (default)
  usage: realpath [OPTION]... FILE...
  about: Print the resolved path
