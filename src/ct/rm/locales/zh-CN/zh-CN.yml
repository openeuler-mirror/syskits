rm:
  clap:
    rm_force: 忽略不存在的文件和参数，绝不提示
    rm_prompt: 每次删除前提示
    rm_no_preserve_root: 不特殊对待'/'
    rm_preserve_root: 不删除'/'（默认）
    rm_recursive: 递归删除目录及其内容
    rm_dir: 删除空目录
    rm_verbose: 说明正在执行的操作
  usage: rm [选项]... 文件...
  about: '删除(取消链接)文件'
  after_help: |-
    默认情况下，rm不删除目录。使用--recursive（-r或-R）选项
    也可以删除每个列出的目录及其所有内容。
    要删除名称以'-'开头的文件，例如'-foo'，
    使用以下命令之一：
    rm -- -foo
    rm ./-foo
    请注意，如果您使用rm删除文件，在有足够专业知识和/或时间的情况下，
    可能恢复其部分内容。为了更有把握地确保内容无法恢复，
    请考虑使用shred。
