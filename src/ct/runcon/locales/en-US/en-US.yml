runcon:
  clap:
    runcon_compute: Compute process transition context before modifying.
    runcon_user: Set user USER in the target security context.
    runcon_role: Set role ROLE in the target security context.
    runcon_type: Set type TYPE in the target security context.
    runcon_range: Set range RANGE in the target security context.
  usage: |-
    runcon [CONTEXT COMMAND [ARG...]]
    runcon [-c] [-u USER] [-r ROLE] [-t TYPE] [-l RANGE] COMMAND [ARG...]
  about: Run command with specified security context under SELinux enabled systems.
  after_help: |-
    Run COMMAND with completely-specified CONTEXT, or with current or transitioned security context modified by one or more of LEVEL, ROLE, TYPE, and USER.
    If none of --compute, --type, --user, --role or --range is specified, then the first argument is used as the complete context.
    Note that only carefully-chosen contexts are likely to successfully run.
    With neither CONTEXT nor COMMAND are specified, then this prints the current security context.
