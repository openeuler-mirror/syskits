# spell-checker:ignore bigdecimal
[package]
name = "ct_seq"

version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true

description = "seq ~ (ctutils) display a sequence of numbers"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/seq"

[lib]
path = "src/seq.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
bigdecimal = { workspace = true }
clap = { workspace = true }
num-bigint = { workspace = true }
num-traits = { workspace = true }
ctcore = { workspace = true, features = ["format", "quoting-style"] }

[[bin]]
name = "seq"
path = "src/main.rs"
