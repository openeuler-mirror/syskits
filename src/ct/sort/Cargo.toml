[package]
name = "ct_sort"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "sort ~ (ctutils) sort input lines"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/sort"

[lib]
path = "src/sort.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
binary-heap-plus = { workspace = true }
clap = { workspace = true }
compare = { workspace = true }
ctrlc = { workspace = true }
fnv = { workspace = true }
itertools = { workspace = true }
memchr = { workspace = true }
rand = { workspace = true }
rayon = { workspace = true }
self_cell = { workspace = true }
tempfile = { workspace = true }
unicode-width = { workspace = true }
ctcore = { workspace = true, features = ["fs", "version-cmp"] }

[[bin]]
name = "sort"
path = "src/main.rs"
