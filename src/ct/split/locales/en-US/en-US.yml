split:
  clap:
    opt_bytes: put SIZE bytes per output file
    opt_line_bytes: put at most SIZE bytes of lines per output file
    opt_lines: put NUMBER lines/records per output file
    opt_number: generate CHUNKS output files; see explanation below
    opt_additional_suffix: additional SUFFIX to append to output file names
    opt_elide_empty_files: do not generate empty output files with '-n'
    opt_numeric_suffixes_short: use numeric suffixes starting at 0, not alphabetic
    opt_numeric_suffixes: same as -d, but allow setting the start value
    opt_hex_suffixes_short: use hex suffixes starting at 0, not alphabetic
    opt_hex_suffixes: same as -x, but allow setting the start value
    opt_suffix_length: generate suffixes of length N (default 2)
    opt_verbose: print a diagnostic just before each output file is opened
    opt_separator: use SEP instead of newline as the record separator; '\\0' (zero) specifies the NUL character
  usage: split [OPTION]... [INPUT [PREFIX]]
  about: Create output files containing consecutive or interleaved sections of input
  after_help: |-
    Output fixed-size pieces of INPUT to PREFIXaa, PREFIXab, ...; default size is 1000, and default PREFIX is 'x'. With no INPUT, or when INPUT is -, read standard input.
    The SIZE argument is an integer and optional unit (example: 10K is 10*1024).
    Units are K,M,G,T,P,E,Z,Y,R,Q (powers of 1024) or KB,MB,... (powers of 1000).
    Binary prefixes can be used, too: KiB=K, MiB=M, and so on.
    CHUNKS may be:
    - N       split into N files based on size of input
    - K/N     output Kth of N to stdout
    - l/N     split into N files without splitting lines/records
    - l/K/N   output Kth of N to stdout without splitting lines/records
    - r/N     like 'l' but use round robin distribution
    - r/K/N   likewise but only output Kth of N to stdout
