[package]
name = "ct_stat"

version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true

description = "stat ~ (ctutils) display FILE status"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/stat"

[lib]
path = "src/stat.rs"

[dependencies]
clap = { workspace = true }
ctcore = { workspace = true, features = ["entries", "libc", "fs", "fsext"] }
chrono = { workspace = true }
rust-i18n = { workspace = true }
sys-locale = { workspace = true }
tempfile = { workspace = true }

[[bin]]
name = "stat"
path = "src/main.rs"
