[package]
name = "ct_stat"
version = "0.0.2"
authors = ["CTyunOS linux developers"]
license = "Mulan PSL v2.0"

homepage.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true

description = "stat ~ (ctutils) display FILE status"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/stat"

[lib]
path = "src/stat.rs"

[dependencies]
clap = { workspace = true }
ctcore = { workspace = true, features = ["entries", "libc", "fs", "fsext"] }
chrono = { workspace = true }
tempfile = "3.4" 
rust-i18n = "2"
sys-locale = "0.2" 

[[bin]]
name = "stat"
path = "src/main.rs"
