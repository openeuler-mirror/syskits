stdbuf:
  clap:
    input: 调整标准输入流缓冲
    output: 调整标准输出流缓冲
    error: 调整标准错误流缓冲
  usage: stdbuf [选项]... 命令
  about: |-
    运行命令，修改其标准流的缓冲操作。

    长选项的必需参数对于短选项也是必需的。
  after_help: |-
    如果模式是'L'，相应的流将是行缓冲的。
    此选项对标准输入无效。
    如果模式是'0'，相应的流将是无缓冲的。
    否则，模式是一个数字，后面可能跟着以下之一：
    KB 1000，K 1024，MB 1000*1000，M 1024*1024，以及G、T、P、E、Z、Y等。
    在这种情况下，相应的流将完全缓冲，缓冲区大小设置为模式字节。
    注意：如果命令自行调整其标准流的缓冲（如tee等），那么这将覆盖stdbuf更改的相应设置。
    此外，某些过滤器（如dd和cat等）不使用流进行I/O，因此不受stdbuf设置的影响。
