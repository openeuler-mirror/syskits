[package]
name = "ct_timeout"

version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "timeout ~ (ctutils) run COMMAND with a DURATION time limit"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/timeout"

[lib]
path = "src/timeout.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
clap = { workspace = true }
libc = { workspace = true }
nix = { workspace = true, features = ["signal"] }
ctcore = { workspace = true, features = ["process", "signals"] }

[[bin]]
name = "timeout"
path = "src/main.rs"
