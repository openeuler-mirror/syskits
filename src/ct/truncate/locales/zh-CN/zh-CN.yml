truncate:
  clap:
    truncate_no_create: 不创建不存在的文件
    truncate_reference: 基于参考文件大小作为每个文件的大小
  usage: truncate [选项]... [文件]...
  about: '缩小或扩展每个文件的大小至指定大小。'
  after_help: |-
    大小是一个可以带有可选前缀和可选单位的整数。
    可用的单位（K、M、G、T、P、E、Z 和 Y）使用以下格式：
    'KB' =>           1000（千字节）
    'K'  =>           1024（kibibytes）
    'MB' =>      1000*1000（兆字节）
    'M'  =>      1024*1024（mebibytes）
    'GB' => 1000*1000*1000（吉字节）
    'G'  => 1024*1024*1024（gibibytes）
    大小也可以用以下前缀之一来调整每个文件基于其当前大小的大小：
    '+'  => 扩展
    '-'  => 减少
    '<'  => 最多
    '>'  => 至少
    '/'  => 向下舍入到倍数
    '%'  => 向上舍入到倍数
