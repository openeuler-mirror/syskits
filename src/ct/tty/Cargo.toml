[package]
name = "ct_tty"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "tty ~ (ctutils) display the name of the terminal connected to standard input"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/tty"


[lib]
path = "src/tty.rs"

[dependencies]
sys-locale = { workspace = true }
rust-i18n = { workspace = true }
clap = { workspace = true }
nix = { workspace = true, features = ["term"] }
ctcore = { workspace = true, features = ["fs"] }

[[bin]]
name = "tty"
path = "src/main.rs"
