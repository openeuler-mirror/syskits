uniq:
  clap:
    all_repeated: 'print all duplicate lines. Delimiting is done with blank lines. [default: none]'
    group: 'show all items, separating groups with an empty line. [default: separate]'
    check_chars: compare no more than N characters in lines
    count: prefix lines by the number of occurrences
    ignore_case: ignore differences in case when comparing
    repeated: only print duplicate lines
    skip_chars: avoid comparing the first N characters
    skip_fields: avoid comparing the first N fields
    unique: only print unique lines
    zero_terminated: end lines with 0 byte, not newline
  usage: uniq [OPTION]... [INPUT [OUTPUT]]
  about: Report or omit repeated lines.
  after_help: |-
    Filter adjacent matching lines from `INPUT` (or standard input),
    writing to `OUTPUT` (or standard output).
    Note: `uniq` does not detect repeated lines unless they are adjacent.
    You may want to sort the input first, or use `sort -u` without `uniq`.
