[package]
name = "ct_wc"
version.workspace = true
authors.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
edition.workspace = true
homepage.workspace = true

description = "wc ~ (ctutils) display newline, word, and byte counts for input"
repository = "https://work.ctyun.cn/git/CTyunOS/syskits/src/branch/master/src/ct/wc"

[lib]
path = "src/wc.rs"

[dependencies]
clap = { workspace = true }
ctcore = { workspace = true, features = ["pipes", "quoting-style"] }
bytecount = { workspace = true }
thiserror = { workspace = true }
unicode-width = { workspace = true }
rust-i18n = { workspace = true }
sys-locale = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[target.'cfg(unix)'.dependencies]
nix = { workspace = true }
libc = { workspace = true }

[[bin]]
name = "wc"
path = "src/main.rs"
